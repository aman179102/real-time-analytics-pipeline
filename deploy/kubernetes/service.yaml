apiVersion: v1
kind: Service
metadata:
  name: analytics-pipeline
  namespace: analytics
  labels:
    app: analytics-pipeline
    component: api
    managed-by: opencode
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: analytics-pipeline
    component: api
