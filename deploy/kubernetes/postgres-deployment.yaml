apiVersion: v1
kind: Service
metadata:
  name: analytics-postgres
  namespace: analytics
  labels:
    app: analytics-postgres
    component: database
    managed-by: opencode
spec:
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app: analytics-postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: analytics-postgres
  namespace: analytics
  labels:
    app: analytics-postgres
    component: database
    managed-by: opencode
spec:
  serviceName: analytics-postgres
  replicas: 1
  selector:
    matchLabels:
      app: analytics-postgres
  template:
    metadata:
      labels:
        app: analytics-postgres
        component: database
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: timescale/timescaledb:2-pg16
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
              protocol: TCP
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: analytics-pipeline-config
                  key: DATABASE_NAME
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: analytics-pipeline-config
                  key: DATABASE_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: analytics-pipeline-secrets
                  key: database-password
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --locale=C"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - analytics
                - -d
                - analytics
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - analytics
                - -d
                - analytics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: analytics-postgres-pvc
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        namespace: analytics
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 50Gi
        storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: analytics-postgres-pvc
  namespace: analytics
  labels:
    app: analytics-postgres
    managed-by: opencode
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
