apiVersion: v1
kind: ConfigMap
metadata:
  name: analytics-pipeline-config
  namespace: analytics
  labels:
    app: analytics-pipeline
    managed-by: opencode
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  HOST: "0.0.0.0"
  PORT: "8000"
  WORKERS: "4"
  APP_VERSION: "1.0.0"
  DATABASE_PROVIDER: "timescaledb"
  DATABASE_HOST: "analytics-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "analytics"
  DATABASE_USER: "analytics"
  DATABASE_POOL_SIZE: "10"
  DATABASE_POOL_OVERFLOW: "20"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_MIN_CONNECTIONS: "5"
  DATABASE_MAX_CONNECTIONS: "20"
  DATABASE_ECHO: "false"
  REDIS_HOST: "analytics-redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_SSL: "false"
  REDIS_STREAM_MAXLEN: "100000"
  REDIS_CONSUMER_GROUP: "analytics-group"
  QUEUE_PROVIDER: "redis_streams"
  KAFKA_BOOTSTRAP_SERVERS: "analytics-kafka:9092"
  KAFKA_TOPIC: "analytics-events"
  KAFKA_CONSUMER_GROUP: "analytics-consumer"
  KAFKA_PARTITIONS: "6"
  KAFKA_REPLICATION_FACTOR: "3"
  KAFKA_MAX_POLL_RECORDS: "500"
  KAFKA_SESSION_TIMEOUT_MS: "30000"
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  BCRYPT_ROUNDS: "12"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  RATE_LIMIT_BURST_SIZE: "100"
  CORS_ALLOWED_ORIGINS: "https://analytics.example.com,https://app.example.com"
  CORS_ALLOW_CREDENTIALS: "true"
  CORS_ALLOW_METHODS: "GET,POST,PUT,DELETE,PATCH,OPTIONS"
  CORS_ALLOW_HEADERS: "*"
  RETENTION_RAW_EVENTS_DAYS: "30"
  RETENTION_AGGREGATED_HOURLY_DAYS: "90"
  RETENTION_AGGREGATED_DAILY_DAYS: "365"
  RETENTION_CHECKPOINT_INTERVAL: "3600"
  SAMPLING_DEFAULT_RATE: "1.0"
  SAMPLING_HIGH_VOLUME_THRESHOLD: "10000"
  SAMPLING_HIGH_VOLUME_RATE: "0.1"
  MAX_EVENT_SIZE_BYTES: "65536"
  BATCH_SIZE: "100"
  FLUSH_INTERVAL_SECONDS: "1.0"
  TRACING_ENABLED: "true"
  TRACING_SERVICE_NAME: "analytics-pipeline"
  TRACING_EXPORTER_ENDPOINT: "http://analytics-tempo:4318/v1/traces"
  TRACING_SAMPLE_RATE: "0.1"
  METRICS_ENABLED: "true"
  METRICS_PORT: "9090"
